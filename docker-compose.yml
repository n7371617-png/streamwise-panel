version: "3.9"
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
